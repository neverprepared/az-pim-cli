name: On Schedule
on:
  schedule:
    - cron: '30 2 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  snyk:
    name: Scan dependencies
    if: false # disabled until SNYK_TOKEN secret is configured
    uses: ./.github/workflows/snyk.yaml
    with:
      severity-treshold: medium
    secrets: inherit

  semgrep:
    name: Scan source code
    uses: ./.github/workflows/semgrep.yaml
    secrets: inherit
