name: Push to main
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yaml

  test:
    name: Run tests
    uses: ./.github/workflows/test.yaml

  snyk:
    name: Scan dependencies
    if: false # disabled until SNYK_TOKEN secret is configured
    uses: ./.github/workflows/snyk.yaml
    with:
      severity-treshold: low
    secrets: inherit
    permissions:
      contents: read
      security-events: write

  semgrep:
    name: Scan source code
    uses: ./.github/workflows/semgrep.yaml
    secrets: inherit
    permissions:
      contents: read
      security-events: write

  release-please:
    name: Create release-please PR
    uses: ./.github/workflows/release-please.yaml
    permissions:
      contents: write
      pull-requests: write

  goreleaser:
    name: Run GoReleaser
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Cache go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --timeout=30m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
